<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">mcp-erp — Architecture</text>

  <!-- MCP Client -->
  <rect x="360" y="55" width="180" height="45" rx="8" fill="#7c3aed" opacity="0.9"/>
  <text x="450" y="83" text-anchor="middle" fill="#fff" font-weight="600">MCP Client (Agent)</text>

  <!-- Arrow down -->
  <path d="M450 100 L450 130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#94a3b8"/></marker></defs>

  <!-- Server box -->
  <rect x="200" y="135" width="500" height="160" rx="10" fill="url(#card)" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="158" text-anchor="middle" fill="#a78bfa" font-weight="bold" font-size="14">mcp-erp (stdio)</text>

  <!-- Tool categories -->
  <rect x="220" y="170" width="110" height="28" rx="5" fill="#1e40af" opacity="0.7"/><text x="275" y="189" text-anchor="middle" fill="#bfdbfe" font-size="11">Customers (4)</text>
  <rect x="340" y="170" width="100" height="28" rx="5" fill="#1e40af" opacity="0.7"/><text x="390" y="189" text-anchor="middle" fill="#bfdbfe" font-size="11">Vendors (4)</text>
  <rect x="450" y="170" width="100" height="28" rx="5" fill="#1e40af" opacity="0.7"/><text x="500" y="189" text-anchor="middle" fill="#bfdbfe" font-size="11">Products (4)</text>
  <rect x="560" y="170" width="120" height="28" rx="5" fill="#1e40af" opacity="0.7"/><text x="620" y="189" text-anchor="middle" fill="#bfdbfe" font-size="11">Sales Orders (4)</text>

  <rect x="220" y="205" width="130" height="28" rx="5" fill="#7e22ce" opacity="0.6"/><text x="285" y="224" text-anchor="middle" fill="#e9d5ff" font-size="11">Purchase Orders (4)</text>
  <rect x="360" y="205" width="110" height="28" rx="5" fill="#dc2626" opacity="0.6"/><text x="415" y="224" text-anchor="middle" fill="#fecaca" font-size="11">Invoices (5)</text>
  <rect x="480" y="205" width="100" height="28" rx="5" fill="#0d9488" opacity="0.7"/><text x="530" y="224" text-anchor="middle" fill="#ccfbf1" font-size="11">Inventory (3)</text>
  <rect x="590" y="205" width="90" height="28" rx="5" fill="#334155"/><text x="635" y="224" text-anchor="middle" fill="#94a3b8" font-size="11">GL (3)</text>

  <rect x="220" y="240" width="120" height="28" rx="5" fill="#b45309" opacity="0.6"/><text x="280" y="259" text-anchor="middle" fill="#fde68a" font-size="11">Governance (3)</text>

  <!-- ErpBackend trait -->
  <rect x="380" y="260" width="140" height="22" rx="4" fill="#065f46" opacity="0.8"/><text x="450" y="276" text-anchor="middle" fill="#6ee7b7" font-size="11" font-style="italic">ErpBackend trait</text>

  <!-- Arrows to backends -->
  <path d="M450 295 L450 320" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M450 320 L130 360" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
  <path d="M450 320 L290 360" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
  <path d="M450 320 L450 360" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
  <path d="M450 320 L610 360" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
  <path d="M450 320 L770 360" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>

  <!-- Backend boxes -->
  <rect x="60" y="360" width="140" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="130" y="385" text-anchor="middle" fill="#fbbf24" font-weight="bold" font-size="12">Zoho Books</text>
  <text x="130" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">REST API</text>
  <text x="130" y="418" text-anchor="middle" fill="#64748b" font-size="10">OAuth2</text>

  <rect x="220" y="360" width="140" height="70" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="290" y="385" text-anchor="middle" fill="#c084fc" font-weight="bold" font-size="12">Odoo</text>
  <text x="290" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">JSON-RPC</text>
  <text x="290" y="418" text-anchor="middle" fill="#64748b" font-size="10">Session auth</text>

  <rect x="380" y="360" width="140" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="385" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="12">Business Central</text>
  <text x="450" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">OData v4</text>
  <text x="450" y="418" text-anchor="middle" fill="#64748b" font-size="10">Azure AD OAuth2</text>

  <rect x="540" y="360" width="140" height="70" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="610" y="385" text-anchor="middle" fill="#f87171" font-weight="bold" font-size="12">NetSuite</text>
  <text x="610" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">SuiteTalk REST</text>
  <text x="610" y="418" text-anchor="middle" fill="#64748b" font-size="10">OAuth 1.0a</text>

  <rect x="700" y="360" width="140" height="70" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="770" y="385" text-anchor="middle" fill="#22d3ee" font-weight="bold" font-size="12">SAP S/4HANA</text>
  <text x="770" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">OData</text>
  <text x="770" y="418" text-anchor="middle" fill="#64748b" font-size="10">OAuth2 / Basic</text>

  <!-- Lifecycle bar -->
  <rect x="60" y="460" width="780" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="100" y="484" fill="#94a3b8" font-size="11">Lifecycle:</text>
  <rect x="170" y="470" width="55" height="20" rx="4" fill="#334155"/><text x="197" y="484" text-anchor="middle" fill="#e2e8f0" font-size="10">draft</text>
  <text x="235" y="484" fill="#64748b">→</text>
  <rect x="248" y="470" width="70" height="20" rx="4" fill="#7e22ce" opacity="0.5"/><text x="283" y="484" text-anchor="middle" fill="#e9d5ff" font-size="10">pending</text>
  <text x="328" y="484" fill="#64748b">→</text>
  <rect x="340" y="470" width="65" height="20" rx="4" fill="#065f46" opacity="0.6"/><text x="372" y="484" text-anchor="middle" fill="#6ee7b7" font-size="10">approved</text>
  <text x="415" y="484" fill="#64748b">→</text>
  <rect x="428" y="470" width="60" height="20" rx="4" fill="#1e40af" opacity="0.6"/><text x="458" y="484" text-anchor="middle" fill="#bfdbfe" font-size="10">released</text>
  <text x="498" y="484" fill="#64748b">→</text>
  <rect x="510" y="470" width="55" height="20" rx="4" fill="#dc2626" opacity="0.5"/><text x="537" y="484" text-anchor="middle" fill="#fecaca" font-size="10">posted</text>
  <text x="575" y="484" fill="#64748b">→</text>
  <rect x="588" y="470" width="55" height="20" rx="4" fill="#0d9488" opacity="0.6"/><text x="615" y="484" text-anchor="middle" fill="#ccfbf1" font-size="10">fulfilled</text>
  <text x="653" y="484" fill="#64748b">→</text>
  <rect x="665" y="470" width="50" height="20" rx="4" fill="#334155"/><text x="690" y="484" text-anchor="middle" fill="#94a3b8" font-size="10">closed</text>
</svg>
