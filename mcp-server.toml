server_id = "mcp_erp"
display_name = "ERP"
version = "1.0.1"
domain = "business-systems"
sdk_version = "0.1.0"
risk_level = "high"
writes_allowed = "gated"
transports = ["stdio"]
credentials = ["vault://zoho-oauth-token", "vault://odoo-session", "vault://bc-oauth-token", "vault://netsuite-oauth", "vault://sap-oauth-token"]
governance_gates = ["erp-write-policy", "financial-action-policy"]
environments = ["development", "staging", "production"]

